<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MythosGate AR</title>
    <script src="https://aframe.io/releases/1.2.0/aframe.min.js"></script>
    <script src="https://raw.githack.com/AR-js-org/AR.js/master/aframe/build/aframe-ar.js"></script>
    <style>
        .chat-box {
            position: fixed; bottom: 0; width: 100%; background: rgba(0,0,0,0.85);
            color: #D4AF37; padding: 15px; border-top: 2px solid #D4AF37; z-index: 999;
        }
        input { width: 70%; padding: 10px; background: #222; border: 1px solid gold; color: white; }
        button { padding: 10px; background: gold; border: none; font-weight: bold; }
        #response { margin-bottom: 10px; font-style: italic; min-height: 20px; }
    </style>
</head>

<body style="margin: 0; overflow: hidden;">
    <a-scene embedded arjs="sourceType: webcam; debugUIEnabled: false;">
        
        <a-assets>
            <a-asset-item id="temple" src="https://raw.githack.com/KhronosGroup/glTF-Sample-Models/master/2.0/Duck/glTF-Binary/Duck.glb"></a-asset-item>
        </a-assets>

        <a-entity gltf-model="#temple" position="0 -1 -5" scale="1 1 1" rotation="0 45 0"></a-entity>

        <a-entity camera></a-entity>
    </a-scene>

    <div class="chat-box">
        <div id="response">Πυθαγόρας: Χαίρε, αναζητητή. Τι βλέπεις στον ορίζοντα;</div>
        <input type="text" id="userInput" placeholder="Μίλα στον Πυθαγόρα...">
        <button onclick="askPython()">ΣΤΕΙΛΕ</button>
    </div>

    <script>
        async function askPython() {
            const q = document.getElementById('userInput').value;
            const resDiv = document.getElementById('response');
            resDiv.innerText = "Ο δάσκαλος σκέφτεται...";
            
            // ΕΔΩ ΣΥΝΔΕΟΥΜΕ ΤΟ PYTHON URL ΣΟΥ
            const pythonUrl = "ΤΟ_URL_ΣΟΥ_ΣΤΟ_STREAMLIT.app"; 
            
            try {
                const response = await fetch(`https://cors-anywhere.herokuapp.com/${pythonUrl}?q=${encodeURIComponent(q)}`);
                const text = await response.text();
                resDiv.innerText = "Πυθαγόρας: " + text;
                
                // Φωνή (TTS)
                const speech = new SpeechSynthesisUtterance(text);
                speech.lang = 'el-GR';
                window.speechSynthesis.speak(speech);
            } catch (e) {
                resDiv.innerText = "Πυθαγόρας: Η σύνδεση με το σύμπαν διεκόπη.";
            }
        }
    </script>
</body>
</html>
